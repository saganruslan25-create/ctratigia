<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAR TABLE — Штаб</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Oswald:wght@300;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0a;
    --panel: #131710;
    --border: #2a3020;
    --accent: #8ab840;
    --accent2: #c4a832;
    --red: #c0392b;
    --text: #c8d4b0;
    --dim: #5a6a48;
    --grid: rgba(138, 184, 64, 0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image:
      repeating-linear-gradient(0deg, var(--grid) 0px, var(--grid) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(90deg, var(--grid) 0px, var(--grid) 1px, transparent 1px, transparent 40px);
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(13,15,10,0.95);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
  }

  header .status {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: blink 1.4s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    height: calc(100vh - 57px);
  }

  /* ---- LEFT: MAP ZONE ---- */
  .map-zone {
    position: relative;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .map-toolbar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    background: rgba(13,15,10,0.8);
    font-size: 11px;
    letter-spacing: 1px;
  }

  .map-toolbar label {
    color: var(--dim);
    text-transform: uppercase;
  }

  .tool-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .tool-btn:hover, .tool-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(138,184,64,0.07);
  }

  .tool-btn.danger { border-color: #3a1a18; color: #c0392b88; }
  .tool-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(192,57,43,0.07); }

  .color-dot {
    width: 18px; height: 18px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .color-dot.selected { border-color: white; }

  input[type=range] {
    -webkit-appearance: none;
    width: 80px;
    height: 3px;
    background: var(--border);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }

  #bgImage {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    pointer-events: none;
    display: none;
  }

  #drawCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .map-placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--dim);
    pointer-events: none;
  }

  .map-placeholder .icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .map-placeholder p {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ---- RIGHT: INTEL PANEL ---- */
  .intel-panel {
    display: flex;
    flex-direction: column;
    background: var(--panel);
    overflow: hidden;
  }

  .panel-section {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
  }

  .upload-area {
    border: 1px dashed var(--border);
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .upload-area:hover { border-color: var(--accent); color: var(--accent); }
  .upload-area input { display: none; }

  #mapPreview {
    width: 100%;
    max-height: 100px;
    object-fit: cover;
    margin-top: 8px;
    display: none;
    border: 1px solid var(--border);
  }

  /* CONTEXT INPUT */
  .context-input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 8px 10px;
    resize: none;
    outline: none;
    letter-spacing: 0.5px;
    line-height: 1.5;
    min-height: 60px;
  }

  .context-input:focus { border-color: var(--dim); }
  .context-input::placeholder { color: var(--dim); }

  .generate-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:hover {
    background: rgba(138,184,64,0.1);
    box-shadow: 0 0 20px rgba(138,184,64,0.15);
  }

  .generate-btn:disabled {
    border-color: var(--dim);
    color: var(--dim);
    cursor: not-allowed;
  }

  .generate-btn .spinner {
    display: none;
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    border: 2px solid var(--dim);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

  /* EVENTS LOG */
  .events-log {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }

  .events-log::-webkit-scrollbar { width: 4px; }
  .events-log::-webkit-scrollbar-track { background: transparent; }
  .events-log::-webkit-scrollbar-thumb { background: var(--border); }

  .event-card {
    border: 1px solid var(--border);
    margin-bottom: 14px;
    animation: slideIn 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--red);
  }

  .event-card.neutral::before { background: var(--accent2); }

  .event-header {
    padding: 8px 12px;
    background: rgba(192,57,43,0.08);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .event-card.neutral .event-header { background: rgba(196,168,50,0.06); }

  .event-type {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    font-weight: bold;
  }

  .event-card.neutral .event-type { color: var(--accent2); }

  .event-time {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .event-location {
    padding: 8px 12px 4px;
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--accent2);
  }

  .event-body {
    padding: 4px 12px 10px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }

  .event-hint {
    padding: 0 12px 8px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    border-top: 1px solid var(--border);
    padding-top: 6px;
    margin-top: 4px;
  }

  .empty-log {
    text-align: center;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 40px 0;
  }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    z-index: 9999;
  }

  /* Typing cursor effect */
  .typing::after {
    content: '█';
    animation: blink 0.7s step-end infinite;
    color: var(--accent);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="scanline"></div>

<header>
  <h1>⬡ War Table</h1>
  <div class="status"><span class="status-dot"></span>СИСТЕМА АКТИВНА — ШТА АНАЛІЗУ</div>
</header>

<main>
  <!-- LEFT: Map + Canvas -->
  <div class="map-zone">
    <div class="map-toolbar">
      <label>Інструмент:</label>
      <button class="tool-btn active" id="btnDraw" onclick="setTool('draw')">✏ Малювати</button>
      <button class="tool-btn" id="btnErase" onclick="setTool('erase')">◻ Стерти</button>
      <button class="tool-btn danger" onclick="clearCanvas()">✕ Очистити</button>
      <span style="width:1px;height:20px;background:var(--border);display:inline-block;margin:0 4px;"></span>
      <label>Колір:</label>
      <div class="color-dot selected" style="background:#c0392b" onclick="setColor('#c0392b',this)" title="Ворог"></div>
      <div class="color-dot" style="background:#2980b9" onclick="setColor('#2980b9',this)" title="Свої"></div>
      <div class="color-dot" style="background:#f39c12" onclick="setColor('#f39c12',this)" title="Позиції"></div>
      <div class="color-dot" style="background:#8ab840" onclick="setColor('#8ab840',this)" title="Лінія фронту"></div>
      <div class="color-dot" style="background:#9b59b6" onclick="setColor('#9b59b6',this)" title="Маршрут"></div>
      <span style="width:1px;height:20px;background:var(--border);display:inline-block;margin:0 4px;"></span>
      <label>Розмір:</label>
      <input type="range" min="2" max="40" value="8" id="brushSize" oninput="brushSz=+this.value">
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <img id="bgImage" alt="map">
      <canvas id="drawCanvas"></canvas>
      <div class="map-placeholder" id="placeholder">
        <div class="icon">⬡</div>
        <p>Завантажте карту<br>або малюйте на порожньому полі</p>
      </div>
    </div>
  </div>

  <!-- RIGHT: Intel Panel -->
  <div class="intel-panel">
    <div class="panel-section">
      <div class="section-label">// Завантажити карту</div>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/*" onchange="loadMapImage(this)">
        [ Клікни або перетягни зображення карти ]
      </div>
      <img id="mapPreview" alt="preview">
    </div>

    <div class="panel-section">
      <div class="section-label">// Контекст операції</div>
      <textarea class="context-input" id="contextInput" rows="3"
        placeholder="Напр: Це мапа Харківської області. Лінія фронту позначена червоним. Синє — позиції нашої піхоти..."></textarea>
    </div>

    <div class="panel-section">
      <button class="generate-btn" id="genBtn" onclick="generateEvent()">
        ▶ Генерувати івент
        <div class="spinner" id="spinner"></div>
      </button>
    </div>

    <div style="padding:12px 16px 6px;border-bottom:1px solid var(--border);">
      <div class="section-label">// Журнал операцій</div>
    </div>

    <div class="events-log" id="eventsLog">
      <div class="empty-log" id="emptyLog">— Немає івентів —<br><br>Завантаж карту, намалюй<br>позиції та натисни генерувати</div>
    </div>
  </div>
</main>

<script>
// ---- CANVAS SETUP ----
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
let tool = 'draw';
let color = '#c0392b';
let brushSz = 8;
let drawing = false;
let lastX, lastY;

function resizeCanvas() {
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  ctx.putImageData(data, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function setTool(t) {
  tool = t;
  document.getElementById('btnDraw').classList.toggle('active', t==='draw');
  document.getElementById('btnErase').classList.toggle('active', t==='erase');
}

function setColor(c, el) {
  color = c;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  if (tool === 'erase') setTool('draw');
}

function clearCanvas() {
  if (confirm('Очистити всі малюнки?')) ctx.clearRect(0,0,canvas.width,canvas.height);
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - r.left, src.clientY - r.top];
}

function startDraw(e) {
  drawing = true;
  [lastX, lastY] = getPos(e);
  e.preventDefault();
}

function doDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const [x, y] = getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.lineWidth = brushSz;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (tool === 'erase') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = color;
    ctx.globalAlpha = 0.85;
  }
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
  [lastX, lastY] = [x, y];
}

function stopDraw() { drawing = false; }

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseleave', stopDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove', doDraw, {passive:false});
canvas.addEventListener('touchend', stopDraw);

// ---- MAP IMAGE ----
function loadMapImage(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const bg = document.getElementById('bgImage');
  bg.src = url;
  bg.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
  const prev = document.getElementById('mapPreview');
  prev.src = url;
  prev.style.display = 'block';
}

// Drag & drop on canvas
wrap.addEventListener('dragover', e => e.preventDefault());
wrap.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  const bg = document.getElementById('bgImage');
  bg.src = url; bg.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
  const prev = document.getElementById('mapPreview');
  prev.src = url; prev.style.display = 'block';
});

// ---- CAPTURE SCREENSHOT (map + drawings) ----
function captureMapBase64() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  const oc = offscreen.getContext('2d');
  const bg = document.getElementById('bgImage');
  if (bg.style.display !== 'none' && bg.src) {
    oc.drawImage(bg, 0, 0, offscreen.width, offscreen.height);
  } else {
    oc.fillStyle = '#1a1e14';
    oc.fillRect(0,0,offscreen.width,offscreen.height);
  }
  oc.drawImage(canvas, 0, 0);
  return offscreen.toDataURL('image/jpeg', 0.85).split(',')[1];
}

// ---- GENERATE EVENT ----
let eventCounter = 0;

async function generateEvent() {
  const btn = document.getElementById('genBtn');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  spinner.style.display = 'block';

  const context = document.getElementById('contextInput').value.trim();
  const imgBase64 = captureMapBase64();

  const systemPrompt = `Ти — AI-аналітик воєнного штабу. Ти отримуєш знімок тактичної карти (можливо з малюнками, позначками, лініями фронту) та контекст від командира. Твоя задача — генерувати реалістичний ТАКТИЧНИЙ ІВЕНТ для настільної стратегічної гри.

ФОРМАТ відповіді (СТРОГО JSON, нічого більше):
{
  "type": "attack" або "intel" або "movement" або "event",
  "location": "Назва місця/напряму (1-4 слова)",
  "title": "Заголовок івенту (5-10 слів)",
  "description": "Детальний опис івенту (3-5 речень). Вказуй конкретні деталі: напрямки, сили, очікувані наслідки. Тон — воєнний брифінг.",
  "marker_hint": "Підказка для гравця де позначити на карті (1-2 речення)"
}`;

  const userContent = [
    {
      type: "image",
      source: { type: "base64", media_type: "image/jpeg", data: imgBase64 }
    },
    {
      type: "text",
      text: context
        ? `Контекст командира: ${context}\n\nПроаналізуй карту та згенеруй тактичний івент.`
        : `Проаналізуй карту та згенеруй тактичний івент. Звертай увагу на кольорові позначки та лінії.`
    }
  ];

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userContent }]
      })
    });

    const data = await response.json();
    const rawText = data.content?.find(b => b.type === 'text')?.text || '';

    let event;
    try {
      const clean = rawText.replace(/```json|```/g, '').trim();
      event = JSON.parse(clean);
    } catch {
      // Fallback if JSON broken
      event = {
        type: 'intel',
        location: 'Невідомо',
        title: 'Аналіз карти завершено',
        description: rawText,
        marker_hint: 'Позначте ключові зони на карті.'
      };
    }

    renderEvent(event);
  } catch (err) {
    console.error(err);
    renderEvent({
      type: 'event',
      location: 'ПОМИЛКА',
      title: 'Не вдалось підключитись до штабу',
      description: `Помилка з'єднання: ${err.message}. Перевірте підключення.`,
      marker_hint: ''
    });
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

function renderEvent(ev) {
  eventCounter++;
  const log = document.getElementById('eventsLog');
  const empty = document.getElementById('emptyLog');
  if (empty) empty.remove();

  const now = new Date();
  const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  const typeLabels = {
    attack: '⚠ АТАКА ВОРОГА',
    movement: '↗ РУХ ВІЙСЬК',
    intel: '◈ РОЗВІДКА',
    event: '◉ ІВЕНТ'
  };

  const card = document.createElement('div');
  card.className = `event-card ${ev.type === 'intel' || ev.type === 'event' ? 'neutral' : ''}`;
  card.innerHTML = `
    <div class="event-header">
      <span class="event-type">${typeLabels[ev.type] || '◉ ІВЕНТ'} #${String(eventCounter).padStart(3,'0')}</span>
      <span class="event-time">${timeStr}</span>
    </div>
    <div class="event-location">${ev.location?.toUpperCase() || '—'}</div>
    <div class="event-body typing" id="evbody${eventCounter}"></div>
    ${ev.marker_hint ? `<div class="event-hint">📍 ${ev.marker_hint}</div>` : ''}
  `;

  log.prepend(card);

  // Typewriter effect
  const bodyEl = document.getElementById(`evbody${eventCounter}`);
  const fullText = `${ev.title}\n\n${ev.description}`;
  let i = 0;
  const typ = setInterval(() => {
    bodyEl.textContent = fullText.slice(0, i);
    i++;
    if (i > fullText.length) {
      clearInterval(typ);
      bodyEl.classList.remove('typing');
    }
  }, 18);
}
</script>
</body>
</html>
